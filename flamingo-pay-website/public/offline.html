<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Flamingo Pay — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #FFF5F0;
      color: #1A1A2E;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      max-width: 360px;
      background: white;
      border: 2px solid #1A1A2E;
      border-radius: 1.5rem;
      padding: 2rem;
      text-align: center;
      box-shadow: 0 6px 0 0 #1A1A2E;
    }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.5rem; }
    p { font-size: 0.875rem; color: #1A1A2E99; line-height: 1.5; }
    .btn {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.75rem 2rem;
      background: #E8315B;
      color: white;
      border: 2px solid #1A1A2E;
      border-radius: 0.75rem;
      font-weight: 800;
      font-size: 0.875rem;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 3px 0 0 #1A1A2E;
    }
    .btn:active { transform: translateY(2px); box-shadow: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>You're offline</h1>
    <p>
      It looks like you've lost your internet connection.
      Flamingo Pay needs the internet to process payments and show your dashboard.
    </p>
    <button class="btn" onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
